name: Release

# Manual, library-only release. Trigger from the Actions tab with the target
# version; the job bumps Cargo.toml, publishes `apple-plist` to crates.io, tags
# the commit, cuts a GitHub Release, and opens a PR to merge the bump back to
# main. Nothing here runs automatically on push.
#
# One-time setup before the first run:
#   1. crates.io Trusted Publishing for `apple-plist`: Repository
#      moonD4rk/apple-plist, Workflow release.yml, environment empty (powers the
#      OIDC `crates-io-auth-action` below — no CARGO_REGISTRY_TOKEN secret).
#   2. A GitHub App installed on this repo with contents+pull-requests write,
#      its credentials in the RELEASE_APP_ID / RELEASE_APP_PRIVATE_KEY secrets
#      (used so the bump PR and tag are pushed by the app, not GITHUB_TOKEN).

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.2.0)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    concurrency:
      group: release
      cancel-in-progress: false
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Validate version input
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$ ]]; then
            echo "::error::Invalid version '$VERSION' (expected semver without leading v, e.g. 0.2.0)"
            exit 1
          fi

      - name: Install cargo-edit
        run: cargo install cargo-edit --locked

      - name: Bump crate version
        env:
          VERSION: ${{ inputs.version }}
        run: cargo set-version --workspace "$VERSION"

      - name: Commit version bump
        env:
          VERSION: ${{ inputs.version }}
        run: |
          cargo update --workspace
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git switch -c "release/v${VERSION}"
          git commit -am "chore: release ${VERSION}"

      - uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p apple-plist

      - name: Push branch, tag and GitHub Release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ inputs.version }}
        run: |
          git push origin "release/v${VERSION}"
          gh release create "v${VERSION}" \
            --target "release/v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes

      - name: Open PR to merge bump into main
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ inputs.version }}
        run: |
          PR_URL=$(gh pr create \
            --base main \
            --head "release/v${VERSION}" \
            --title "chore: release ${VERSION}" \
            --body "Version bump for \`${VERSION}\`, already published to crates.io by the release workflow.")
          gh pr merge "$PR_URL" --auto --squash --delete-branch
