version: 2

updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    # Bundle related crates that tend to release together into one PR.
    groups:
      serde-stack:
        patterns:
          - serde
          - serde_*
      xml-stack:
        patterns:
          - quick-xml
      time-stack:
        patterns:
          - time
      test-stack:
        patterns:
          - proptest
          - insta
          - criterion
          - tempfile

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: "ci"
    ignore:
      # `dtolnay/rust-toolchain` uses Rust version strings as refs
      # (e.g. `@1.88` means "install Rust 1.88", not "action v1.88").
      # Dependabot misreads these as semver action bumps and proposes
      # nonsensical updates. Ignore version updates for this action.
      - dependency-name: "dtolnay/rust-toolchain"
