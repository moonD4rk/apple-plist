edition = "2024"
max_width = 100
newline_style = "Unix"
hard_tabs = false
tab_spaces = 4
use_field_init_shorthand = true
use_try_shorthand = true

# Nightly-only options — run `cargo +nightly fmt`. The crate itself still builds
# and tests on stable; only the formatting step needs nightly rustfmt.
group_imports = "StdExternalCrate"
imports_granularity = "Module"
format_code_in_doc_comments = true
normalize_comments = true
normalize_doc_attributes = true
